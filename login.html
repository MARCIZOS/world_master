<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - GeoExplorer</title>
  <link rel="stylesheet" href="hero.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    .login-section {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a3a 60%, #23234a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(24, 24, 36, 0.98);
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.18);
      padding: 40px 32px 28px 32px;
      min-width: 340px;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .login-title {
      color: #ffd600;
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 18px;
      text-align: center;
      letter-spacing: 1px;
    }
    .login-card label {
      color: #fff;
      font-weight: 700;
      margin-bottom: 6px;
      margin-top: 12px;
      font-size: 1rem;
    }
    .login-card input {
      border-radius: 8px;
      border: 1.5px solid #444;
      padding: 12px 10px;
      font-size: 1rem;
      margin-bottom: 8px;
      background: #23233a;
      color: #fff;
      outline: none;
      transition: border 0.2s;
    }
    .login-card input:focus {
      border: 1.5px solid #ffd600;
    }
    .login-btn {
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 800;
      padding: 14px 0;
      margin-top: 18px;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(39,174,96,0.15);
    }
    .login-btn:hover {
      background: #219150;
    }
    .login-link {
      color: #ffd600;
      text-align: center;
      margin-top: 18px;
      font-size: 1rem;
      display: block;
      text-decoration: underline;
    }
    .login-note {
      color: #bbb;
      font-size: 0.85rem;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-section">
    <form class="login-card" id="login-form">
      <div class="login-title">Log In to GeoExplorer</div>
      <label for="login-username">Username</label>
      <input type="text" id="login-username" name="username" required autocomplete="username">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" name="password" required autocomplete="current-password">
      <button type="submit" class="login-btn">Log In</button>
      <a href="register.html" class="login-link">Don't have an account? Register</a>
      <div class="login-note">
        By logging in you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </div>
    </form>
    <script>
      document.getElementById('login-form').onsubmit = async function(e) {
        e.preventDefault();
        console.log('Login form submitted');
        
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        
        console.log('Login data:', { username, password: '***' });
        
        try {
          const res = await fetch('backend/login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          
          console.log('Response status:', res.status);
          
          if (!res.ok) {
            throw new Error(`HTTP error! status: ${res.status}`);
          }
          
          const data = await res.json();
          console.log('Response data:', data);
          
          if (data.success) {
            localStorage.setItem('userLoggedIn', 'true');
            localStorage.setItem('username', data.username);
            alert('Login successful! Redirecting to game...');
            window.location.href = 'index.html?game=true';
          } else {
            alert(data.error || 'Login failed.');
          }
        } catch (error) {
          console.error('Login error:', error);
          alert('Login failed. Please check if XAMPP is running and try again.');
        }
      }
    </script>
  </div>
</body>
</html>
