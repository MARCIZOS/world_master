<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geography Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        // Check if user is coming from registration or if they should see hero page first
        if (!localStorage.getItem('userRegistered') && !window.location.search.includes('game=true')) {
            window.location.href = 'hero.html';
        }
    </script>
</head>
<body>
    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <div id="floating-highest-score" style="position:fixed;bottom:30px;right:30px;z-index:1000;min-width:220px;max-width:300px;background:#f8f8ff;border-radius:12px;border:1px solid #d1d1e0;box-shadow:0 2px 12px rgba(78,84,200,0.12);padding:18px 20px;display:flex;flex-direction:column;align-items:flex-start;">
                <h3 style="color:#4e54c8;margin:0 0 8px 0;font-size:1.1rem;">Highest Score</h3>
                <div id="floating-highest-score-content" style="font-size:1.2rem;color:#222;"></div>
            </div>
            <h1>Geography Explorer</h1>
            <div class="game-modes">
                <button id="countries-mode" class="mode-btn"><i class="fas fa-globe-americas"></i> Countries Mode</button>
                <button id="capitals-mode" class="mode-btn"><i class="fas fa-city"></i> Capitals Mode</button>
                <button id="landmarks-mode" class="mode-btn" disabled><i class="fas fa-mountain"></i> Landmarks Mode (Coming Soon)</button>
            </div>
            <div class="difficulty-levels">
                <button id="easy-level" class="level-btn"><i class="fas fa-smile"></i> Easy Mode</button>
                <button id="medium-level" class="level-btn"><i class="fas fa-meh"></i> Medium Mode</button>
                <button id="hard-level" class="level-btn selected"><i class="fas fa-dizzy"></i> Hard Mode</button>
            </div>
            <div class="game-types">
                <button id="timer-mode" class="type-btn"><i class="fas fa-clock"></i> Timer Mode</button>
                <button id="lives-mode" class="type-btn"><i class="fas fa-heart"></i> Lives Mode</button>
            </div>
            <button id="start-game" class="primary-btn"><i class="fas fa-play"></i> Start Game</button>
        </div>

        <!-- Gameplay Screen -->
        <div id="gameplay-screen" class="screen hidden">
            <div class="game-header">
                <div class="score-container">
                    <span><i class="fas fa-star"></i> Score: <span id="score">0</span></span>
                </div>
                <div class="game-info">
                    <span id="timer" class="hidden"><i class="fas fa-hourglass-half"></i> Time: <span id="time-left">60</span>s</span>
                    <span id="lives" class="hidden"><i class="fas fa-heart"></i> Lives: <span id="lives-left">3</span></span>
                </div>
            </div>
            
            <div id="map-container">
                <div id="map"></div>
            </div>
            
            <div class="question-container">
                <h2 id="question">Which country is this?</h2>
                
                <div id="text-input-container">
                    <input type="text" id="answer-input" placeholder="Type country name...">
                    <div id="autocomplete-container" class="hidden"></div>
                    <button id="submit-answer" class="primary-btn"><i class="fas fa-check"></i> Submit</button>
                </div>
                
                <div id="multiple-choice-container" class="hidden">
                    <div id="options-container"></div>
                </div>
            </div>
            
            <div id="feedback-container" class="hidden">
                <div id="answer-feedback"></div>
                <div id="location-fact"></div>
                <button id="next-question" class="primary-btn"><i class="fas fa-arrow-right"></i> Next Location</button>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="screen hidden">
            <h1>Game Over!</h1>
            <div class="results-container">
                <p><i class="fas fa-trophy"></i> Final Score: <span id="final-score">0</span></p>
                <p><i class="fas fa-bullseye"></i> Accuracy: <span id="accuracy">0</span>%</p>
                <p><i class="fas fa-map-marker-alt"></i> Locations Visited: <span id="locations-visited">0</span></p>
                <div id="highest-score-block"></div>
            </div>
            <button id="play-again" class="primary-btn"><i class="fas fa-redo"></i> Play Again</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <!-- Make sure data.js is loaded before game.js -->
    <script src="js/data.js"></script>
    <script src="js/game.js"></script>
    <script>
        // Fetch and display the highest score in the floating block
        document.addEventListener('DOMContentLoaded', function() {
            fetch('backend/scores.php')
                .then(res => res.json())
                .then(data => {
                    if (data.success && Array.isArray(data.scores) && data.scores.length > 0) {
                        // Find the highest score
                        let highest = data.scores.reduce((max, entry) => entry.score > max.score ? entry : max, data.scores[0]);
                        document.getElementById('floating-highest-score-content').innerHTML = `<strong>${highest.name}</strong>: <span style='color:#27ae60;'>${highest.score}</span>`;
                    } else {
                        document.getElementById('floating-highest-score-content').textContent = 'No scores yet.';
                    }
                })
                .catch(() => {
                    document.getElementById('floating-highest-score-content').textContent = 'Unable to load.';
                });
        });
    </script>
    <script>
        // Check if scripts are loaded properly
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM fully loaded');
            console.log('Checking if submit button exists:', document.getElementById('submit-answer') ? 'Yes' : 'No');
            // The main game logic is handled in game.js, so this block is only for debugging.
        });
    </script>
</body>
</html>
