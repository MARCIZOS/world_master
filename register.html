<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - GeoExplorer</title>
  <link rel="stylesheet" href="hero.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    .register-section {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a3a 60%, #23234a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .register-card {
      background: rgba(24, 24, 36, 0.98);
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.18);
      padding: 40px 32px 28px 32px;
      min-width: 340px;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .register-title {
      color: #ffd600;
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 18px;
      text-align: center;
      letter-spacing: 1px;
    }
    .register-card label {
      color: #fff;
      font-weight: 700;
      margin-bottom: 6px;
      margin-top: 12px;
      font-size: 1rem;
    }
    .register-card input {
      border-radius: 8px;
      border: 1.5px solid #444;
      padding: 12px 10px;
      font-size: 1rem;
      margin-bottom: 8px;
      background: #23233a;
      color: #fff;
      outline: none;
      transition: border 0.2s;
    }
    .register-card input:focus {
      border: 1.5px solid #ffd600;
    }
    .register-btn {
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 800;
      padding: 14px 0;
      margin-top: 18px;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(39,174,96,0.15);
    }
    .register-btn:hover {
      background: #219150;
    }
    .register-link {
      color: #ffd600;
      text-align: center;
      margin-top: 18px;
      font-size: 1rem;
      display: block;
      text-decoration: underline;
    }
    .register-note {
      color: #bbb;
      font-size: 0.85rem;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="register-section">
  <!-- Only one registration form should exist -->
      <form class="register-card" id="register-form">
        <div class="register-title">Create Your Account</div>
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" name="username" required autocomplete="username">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" name="email" required autocomplete="email">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" required autocomplete="new-password">
        <button type="submit" class="register-btn">Register</button>
        <a href="login.html" class="register-link">Already have an account? Log in</a>
        <div class="register-note">
          By registering you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </div>
      </form>
      <script>
        document.getElementById('register-form').onsubmit = async function(e) {
          e.preventDefault();
          console.log('Registration form submitted');
          
          const username = document.getElementById('reg-username').value.trim();
          const email = document.getElementById('reg-email').value.trim();
          const password = document.getElementById('reg-password').value;
          
          console.log('Form data:', { username, email, password: '***' });
          
          try {
            const res = await fetch('backend/register.php', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, email, password })
            });
            
            console.log('Response status:', res.status);
            
            if (!res.ok) {
              throw new Error(`HTTP error! status: ${res.status}`);
            }
            
            const data = await res.json();
            console.log('Response data:', data);
            
            if (data.success) {
              localStorage.setItem('userRegistered', 'true');
              alert('Registration successful! Redirecting to game...');
              window.location.href = 'index.html?game=true';
            } else {
              alert(data.error || 'Registration failed.');
            }
          } catch (error) {
            console.error('Registration error:', error);
            alert('Registration failed. Please check if XAMPP is running and try again.');
          }
        }
      </script>
  </div>
</body>
</html>
